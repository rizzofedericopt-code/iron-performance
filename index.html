<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Iron Performance — @federizzo_trainer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230A0A0A'/%3E%3Cpolyline points='12,47 25,38 38,28' fill='none' stroke='%23F4F5F7' stroke-width='7' stroke-linejoin='round' stroke-linecap='round'/%3E%3Cpolyline points='38,28 51,16' fill='none' stroke='%23E63946' stroke-width='7' stroke-linejoin='round' stroke-linecap='round'/%3E%3Ccircle cx='51' cy='16' r='6.5' fill='%23E63946'/%3E%3C/svg%3E">
<style>
:root{
  --bg:#0A0A0A; --surface:#141416; --surface2:#1c1c1f; --surface3:#252528;
  --line:#2c2c30; --line2:#3a3a3f;
  --text:#F4F5F7; --muted:#8A8A8E; --muted2:#6C757D;
  --accent:#E63946;
  --up:#34C759; --upbg:rgba(52,199,89,0.12);
  --down:#FF453A; --downbg:rgba(255,69,58,0.12);
  --flat:#6C757D; --flatbg:rgba(108,117,125,0.10);
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
body{min-height:100vh;font-size:14px;line-height:1.4}

/* ── Top bar ── */
.top{position:sticky;top:0;z-index:40;background:rgba(10,10,10,0.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);padding:12px 14px 0}
.top-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px}
.brand{display:flex;flex-direction:column;line-height:1.1}
.brand .logo{height:30px;width:auto;display:block;margin-bottom:3px}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--up);margin-right:5px;vertical-align:middle;transition:.2s}
.sdot.saving{background:#FFB340} .sdot.off{background:var(--down)}
.login{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:22px}
.login.hide{display:none}
.login-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--line2);border-radius:20px;padding:28px 22px 22px;text-align:center}
.login-name{font-family:'Montserrat',var(--sans);font-weight:600;font-size:20px;letter-spacing:1px;color:var(--text);margin-top:2px}
.login-name b{font-weight:800}
.login-sub{color:var(--muted2);font-size:12.5px;margin:4px 0 18px}
.login-card .fl{text-align:left}
.login-err{color:var(--down);font-size:12px;margin-top:10px;min-height:14px;text-align:left}
.login-note{color:var(--muted2);font-size:10.5px;line-height:1.5;margin-top:14px}
.brand b{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.brand b span{color:var(--accent)}
.brand small{color:var(--muted2);font-size:10px;font-family:var(--mono);margin-top:2px;letter-spacing:0.2px}
.actions{display:flex;gap:7px;align-items:center}
.btn{border:1px solid var(--line2);background:var(--surface2);color:var(--text);
  font-family:var(--sans);font-size:12.5px;font-weight:600;padding:8px 12px;border-radius:9px;
  cursor:pointer;white-space:nowrap;transition:.12s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--surface3);border-color:#4a4a4f}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(1.08)}
.btn.icon{padding:8px 11px;font-size:15px}
.btn.sm{padding:6px 10px;font-size:11.5px}

/* ── Sport tabs ── */
.sports{display:flex;gap:4px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.sports::-webkit-scrollbar{display:none}
.sport{flex:0 0 auto;border:1px solid var(--line);background:transparent;color:var(--muted);
  font-family:var(--sans);font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:20px;
  cursor:pointer;transition:.12s;display:flex;align-items:center;gap:6px}
.sport:hover{border-color:var(--line2);color:var(--text)}
.sport.on{background:var(--text);color:#0A0A0A;border-color:var(--text)}
.sport .n{font-family:var(--mono);font-size:10px;opacity:.6}

/* ── Legend ── */
.legend{display:flex;align-items:center;gap:14px;padding:9px 14px;color:var(--muted2);font-size:11px;
  border-bottom:1px solid var(--line);flex-wrap:wrap}
.legend .it{display:flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:2px;display:inline-block}

/* ── Grid ── */
.wrap{overflow:auto;max-height:calc(100vh - 212px)}
table{border-collapse:separate;border-spacing:0;min-width:100%}
thead th{position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:1px solid var(--line2)}
th,td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);text-align:center;vertical-align:middle}

/* athlete column (sticky left) */
.cAth{position:sticky;left:0;z-index:25;background:var(--surface);text-align:left;
  min-width:148px;max-width:148px;padding:10px 12px}
thead .cAth{z-index:30}
.cAth .nm{font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:7px}
.cAth .sx{font-family:var(--mono);font-size:9px;color:var(--muted2);border:1px solid var(--line2);
  border-radius:4px;padding:1px 4px;line-height:1.3}
.cAth .sub{color:var(--muted2);font-size:10px;margin-top:3px;font-family:var(--mono)}
.cAth .del{opacity:0;color:var(--muted2);font-size:11px;cursor:pointer;margin-left:auto}
.cAth:hover .del{opacity:1}

/* test header */
.th-test{min-width:96px;max-width:96px;padding:9px 6px;cursor:default}
.th-test .tn{font-weight:700;font-size:12px;letter-spacing:-0.2px}
.th-test .tu{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;text-transform:none}
.th-test .dir{font-size:8.5px;color:var(--muted2);margin-top:3px;font-family:var(--mono)}
.th-test .cat{font-size:8px;color:var(--accent);font-weight:700;text-transform:uppercase;
  letter-spacing:0.4px;margin-bottom:4px;opacity:.85}

/* data cell */
td.cell{min-width:96px;max-width:96px;height:64px;padding:6px 5px;cursor:pointer;position:relative;transition:.1s}
td.cell:hover{background:var(--surface2)}
.cell .val{font-family:var(--mono);font-size:15px;font-weight:600;line-height:1}
.cell .delta{font-family:var(--mono);font-size:10px;font-weight:700;margin-top:3px;display:inline-flex;
  align-items:center;gap:2px;padding:1px 5px;border-radius:5px}
.up{color:var(--up);background:var(--upbg)} .down{color:var(--down);background:var(--downbg)}
.flat{color:var(--flat);background:var(--flatbg)}
.cell .spark{margin-top:4px;height:14px;display:block}
.cell .empty{color:var(--line2);font-size:18px;font-family:var(--mono)}
.cell.tinted-up{box-shadow:inset 3px 0 0 var(--up)}
.cell.tinted-down{box-shadow:inset 3px 0 0 var(--down)}

/* level dot */
.lvdot{position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%}

tbody tr:hover .cAth{background:var(--surface2)}

/* empty state */
.empty-state{padding:60px 24px;text-align:center;color:var(--muted2)}
.empty-state h3{color:var(--text);font-size:16px;margin-bottom:6px;font-weight:600}
.empty-state p{font-size:13px;margin-bottom:18px;line-height:1.5}

/* ── Modal ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.66);backdrop-filter:blur(3px);z-index:100;
  display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
@media(min-width:640px){.ov.on{align-items:center}}
.modal{background:var(--surface);border:1px solid var(--line2);border-radius:18px 18px 0 0;
  width:100%;max-width:460px;max-height:92vh;overflow:auto;padding:18px}
@media(min-width:640px){.modal{border-radius:18px}}
.mh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.mh .mt{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.mh .ms{color:var(--muted);font-size:11px;font-family:var(--mono);margin-top:3px}
.mcl{background:var(--surface2);border:1px solid var(--line2);color:var(--muted);width:30px;height:30px;
  border-radius:8px;font-size:15px;cursor:pointer;flex:0 0 auto}
.mcl:hover{color:var(--text)}
label.fl{display:block;font-size:11px;color:var(--muted);font-weight:600;margin:14px 0 6px;
  text-transform:uppercase;letter-spacing:0.4px}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--line2);color:var(--text);
  font-family:var(--sans);font-size:15px;padding:11px 12px;border-radius:10px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{min-height:62px;resize:vertical;line-height:1.45}
input.mono{font-family:var(--mono)}
.row2{display:flex;gap:9px}.row2>*{flex:1}
.psec{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:20px 0 4px;border-bottom:1px solid var(--line);padding-bottom:6px}
.medflag{color:var(--down);font-weight:700}
.pcheck{display:flex;align-items:flex-start;gap:11px;padding:10px 0;cursor:pointer;font-size:13.5px;line-height:1.4;border-bottom:1px solid var(--line)}
.pcheck input{width:20px;height:20px;flex:0 0 auto;accent-color:var(--accent);margin-top:0;cursor:pointer}
.pcheck span{color:var(--text);padding-top:1px}
.hist{margin-top:6px;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.hrow{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line);font-size:13px}
.hrow:last-child{border-bottom:none}
.hrow .hd{font-family:var(--mono);color:var(--muted);font-size:11px;flex:0 0 88px}
.hrow .hv{font-family:var(--mono);font-weight:600;font-size:14px;flex:1}
.hrow .hdl{color:var(--muted2);cursor:pointer;font-size:13px;padding:2px 6px}
.hrow .hdl:hover{color:var(--down)}
.lvbar{display:flex;gap:4px;margin-top:8px}
.lvseg{flex:1;text-align:center;font-family:var(--mono);font-size:9px;padding:5px 2px;border-radius:6px;
  background:var(--surface2);color:var(--muted)}
.lvseg.hit{background:var(--accent);color:#fff;font-weight:700}
.hint{color:var(--muted2);font-size:11px;line-height:1.5;margin-top:8px}
/* guida */
.thi{margin-top:5px;font-size:9px;color:var(--muted2);cursor:pointer;font-family:var(--mono)}
.thi:hover{color:var(--accent)}
.gbtn{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--line2);
  color:var(--text);font-size:12px;font-weight:600;padding:8px 12px;border-radius:9px;cursor:pointer;margin-top:12px;width:100%;justify-content:center}
.gbtn:hover{background:var(--surface3)}
.gback{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:2px 0 6px;display:inline-flex;gap:5px;align-items:center}
.gback:hover{color:var(--text)}
.eyebrow{color:var(--accent);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px}
.gsec{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin:18px 0 8px}
.gwhat{font-size:13.5px;line-height:1.6;color:var(--text)}
.gwhat b{color:#fff;font-weight:600}
.alert{border-radius:10px;padding:10px 12px;font-size:12.5px;line-height:1.45;margin-top:12px;display:flex;gap:9px}
.alert .ai{flex:0 0 auto}
.alert.warn{background:rgba(255,159,10,0.10);border:1px solid rgba(255,159,10,0.3);color:#FFB340}
.alert.danger{background:var(--downbg);border:1px solid rgba(255,69,58,0.3);color:#FF6961}
.alert.info{background:rgba(10,132,255,0.10);border:1px solid rgba(10,132,255,0.3);color:#5AC8FA}
.steps{margin-top:2px}
.step{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.step:last-child{border-bottom:none}
.snum{flex:0 0 25px;height:25px;border-radius:50%;background:var(--accent);color:#fff;font-family:var(--mono);
  font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.sbody .stt{font-weight:600;font-size:13.5px;margin-bottom:2px}
.sbody .sds{color:var(--muted);font-size:12px;line-height:1.5}
.sbody .sds code{font-family:var(--mono);color:#5AC8FA;font-size:11.5px;background:var(--surface2);padding:1px 5px;border-radius:4px}
.gnote{font-size:11px;color:var(--muted2);line-height:1.5;margin-top:14px;border-top:1px solid var(--line);padding-top:11px}
.glist .grow{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:11px;margin-bottom:7px;cursor:pointer;transition:.1s}
.glist .grow:hover{background:var(--surface2);border-color:var(--line2)}
.glist .gic{font-size:18px;flex:0 0 auto;width:22px;text-align:center}
.glist .gnm{font-weight:600;font-size:14px}
.glist .gsub{color:var(--muted2);font-size:11px;font-family:var(--mono);margin-top:1px}
.glist .gar{margin-left:auto;color:var(--muted2);font-size:18px}
.gcat{font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin:16px 0 9px}
ul.kb{margin:2px 0 0;padding-left:18px}
ul.kb li{font-size:13px;line-height:1.55;color:var(--text);margin-bottom:7px}
ul.kb li b{color:#fff;font-weight:600}
.star{color:#FFB340;margin-right:3px}
.bsports{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;scrollbar-width:none}
.bsports::-webkit-scrollbar{display:none}
.bsports button{flex:0 0 auto;border:1px solid var(--line2);background:var(--surface2);color:var(--muted);font-family:var(--sans);font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer}
.bsports button.on{background:var(--accent);border-color:var(--accent);color:#fff}
.bgrp{border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:11px;background:var(--surface2)}
.bgrp .bt{font-weight:700;font-size:14px;color:var(--text)}
.bgrp .bw{font-family:var(--mono);font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.bgrp .by{font-size:12px;color:var(--muted);margin:7px 0 10px;line-height:1.45}
.btests{display:flex;flex-wrap:wrap;gap:6px}
.btchip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line2);background:var(--surface);border-radius:16px;padding:6px 11px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer}
.btchip:hover{border-color:var(--accent)}
.bsess-test{margin-bottom:16px}
.bsess-th{font-weight:700;font-size:13px;color:var(--text);padding:8px 0 7px;border-bottom:1px solid var(--line);margin-bottom:5px}
.bsess-th span{color:var(--muted2);font-family:var(--mono);font-size:11px;font-weight:400}
/* ---- Export PDF / stampa scheda atleta ---- */
#printArea{display:none}
.pdoc{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:#111;background:#fff;font-size:12px;line-height:1.5;max-width:760px;margin:0 auto;padding:18px}
.pdoc h1{font-size:21px;margin:2px 0 0}
.pdoc .pbrand{font-family:ui-monospace,'SF Mono',monospace;color:#E63946;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.pdoc .pmeta{color:#555;font-size:11px;margin-top:3px}
.pdoc .psc{font-weight:800;font-size:12px;margin:16px 0 6px;border-bottom:1px solid #ccc;padding-bottom:3px;color:#111;text-transform:uppercase;letter-spacing:.5px}
.pdoc .pf{margin:3px 0;color:#222}
.pdoc .pf b{color:#000}
.pdoc table{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px}
.pdoc th,.pdoc td{border:1px solid #ccc;padding:4px 7px;text-align:left}
.pdoc th{background:#f2f2f2;font-weight:700}
.pdoc .palert{border:1px solid #E63946;background:#fde8ea;color:#7a1722;padding:8px 11px;border-radius:6px;margin:12px 0;font-size:11.5px}
.pdoc .pfoot{margin-top:20px;color:#999;font-size:10px;border-top:1px solid #ddd;padding-top:7px}
.pdoc .pbrief .gsec{font-weight:700;font-size:12px;margin:11px 0 3px;color:#111}
.pdoc .pbrief ul.kb{margin:3px 0 7px 18px;padding:0;list-style:disc}
.pdoc .pbrief ul.kb li{margin:2px 0;color:#222;font-size:11.5px}
.pdoc .pbrief .gnote{color:#555;background:#f5f5f5;border:1px solid #e0e0e0;padding:6px 9px;border-radius:5px;font-size:11px;margin:4px 0}
.pdoc .pbrief b{color:#000}
@media print{
  body.printing > *{display:none !important}
  body.printing > #printArea{display:block !important}
  @page{margin:14mm}
}
/* ---- Vista Oggi (cruscotto) ---- */
.tstats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.tstat{background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:11px 6px;text-align:center}
.tsv{font-size:22px;font-weight:800;color:var(--text);font-family:var(--sans);line-height:1}
.tsv.up{color:var(--up)} .tsv.down{color:var(--accent)}
.tsl{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.3px}
.tsec{font-weight:700;font-size:13px;color:var(--text);margin:18px 0 9px}
.tcard{display:flex;flex-direction:column;gap:8px;background:var(--surface2);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:11px;padding:11px 13px;margin-bottom:8px;cursor:pointer}
.tcard:active{opacity:.8}
.tname{font-weight:700;font-size:14px;color:var(--text)}
.tflags{display:flex;flex-wrap:wrap;gap:6px}
.tflag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:14px;border:1px solid}
.tflag.down{color:#ff7a82;border-color:rgba(230,57,70,.4);background:rgba(230,57,70,.08)}
.tflag.amber{color:#FFB340;border-color:rgba(255,159,10,.4);background:rgba(255,159,10,.08)}
.tempty{background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:18px;text-align:center;color:var(--up);font-weight:600}
.treadywrap{display:flex;flex-wrap:wrap;gap:7px}
.tready{font-size:12px;color:var(--muted);background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:6px 11px;cursor:pointer}
.tready b{color:var(--up)}
.tactions{display:flex;gap:8px;margin-top:20px}
.tsugg{font-size:12px;color:var(--muted);background:var(--surface);border:1px dashed var(--line2);border-radius:9px;padding:7px 10px;line-height:1.4}
.bar-tests{margin-left:8px}
.chq{display:flex;gap:7px;flex-wrap:wrap;margin:4px 0 6px}
.tchk{display:flex;align-items:center;gap:9px;padding:7px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.tchk input{width:18px;height:18px;accent-color:var(--accent);flex:0 0 auto}
.tchk span{font-size:13px;color:var(--text)}
.tchk span i{color:var(--muted2);font-family:var(--mono);font-size:11px;font-style:normal}
.tchk span em{color:var(--accent);font-style:normal;font-size:10px;font-family:var(--mono);text-transform:uppercase}
.thr{display:flex;align-items:center;flex-wrap:wrap;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.thr label{flex:1;font-size:13px;color:var(--text)}
.thr input{flex:0 0 78px;text-align:right}
.thr .thrh{flex:0 0 100%;font-size:11px;color:var(--muted2)}
.thr-act{display:flex;gap:8px;justify-content:space-between;margin-top:18px}
/* vista andamento */
.seg{display:inline-flex;border:1px solid var(--line2);border-radius:9px;overflow:hidden;flex:0 0 auto}
.seg button{background:transparent;border:none;color:var(--muted);font-family:var(--sans);font-size:12px;font-weight:600;padding:6px 15px;cursor:pointer;transition:.1s}
.seg button.on{background:var(--text);color:#0A0A0A}
.leg{display:flex;gap:13px;margin-left:auto}
.leg .it{display:flex;align-items:center;gap:5px}
.barhint{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted2)}

.chip{flex:0 0 auto;border:1px solid var(--line);background:transparent;color:var(--muted);font-family:var(--sans);font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:18px;cursor:pointer;transition:.1s}

.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.trendhead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:12px 16px 2px}
.trendhead .thn{font-weight:700;font-size:15.5px;display:block;letter-spacing:-0.2px}
.trendhead .thu{font-family:var(--mono);font-size:10px;color:var(--muted2);margin-top:2px;display:block}
.chartbox{padding:10px 12px 2px}
.chart{width:100%;height:auto;display:block;background:var(--surface);border:1px solid var(--line);border-radius:13px}
.alegend{display:flex;flex-wrap:wrap;gap:7px;padding:10px 14px 2px}
.atag{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line2);background:var(--surface2);color:var(--text);font-family:var(--sans);font-size:12px;font-weight:600;padding:5px 11px;border-radius:16px;cursor:pointer;transition:.1s}
.atag.off{opacity:.38}
.adot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:0 0 auto}
.ttbl{margin:10px 14px 26px;border:1px solid var(--line);border-radius:13px;overflow:hidden}
.ttr{display:flex;align-items:center;padding:11px 12px;border-bottom:1px solid var(--line);font-size:13px}
.ttr:last-child{border-bottom:none}
.ttr.tth{background:var(--surface2);font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:600}
.tc{flex:1;text-align:right}
.tc.nm{flex:1.7;text-align:left;display:flex;align-items:center;gap:8px;font-weight:600}
.tc.mono{font-family:var(--mono)}
.ttr .delta{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px}
/* readiness / fatica */
.amber{color:#FFB340;background:rgba(255,159,10,.12)}
.rd-top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px 4px;flex-wrap:wrap}
.rd-legend{font-size:10px;color:var(--muted2);font-family:var(--mono)}
.rd-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer}
.rd-row:hover{background:var(--surface2)}
.rd-score{font-family:var(--mono);font-weight:700;font-size:20px;min-width:56px;text-align:center;border-radius:9px;padding:8px 4px;flex:0 0 auto}
.rd-score.none{color:var(--muted2);background:var(--surface2);font-size:16px}
.rd-main{flex:1;min-width:0}
.rd-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.rd-sub{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
.rd-chip{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--surface2);border:1px solid var(--line);border-radius:5px;padding:2px 6px}
.rd-cmj{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px}
.ci-head{display:flex;gap:7px;padding:8px 0 6px;font-size:13px}
.ci-head .ci-n{flex:1}.ci-head span{flex:0 0 44px;text-align:center}
.ci-row{display:flex;align-items:center;gap:7px;padding:8px 0;border-bottom:1px solid var(--line)}
.ci-row .ci-n{flex:1;font-weight:600;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-row select{flex:0 0 44px;padding:8px 2px;text-align:center;font-family:var(--mono);font-size:14px}
/* squadre */
.teams{display:flex;gap:6px;overflow-x:auto;padding-bottom:9px;scrollbar-width:none}
.teams::-webkit-scrollbar{display:none}
.team{flex:0 0 auto;border:1px solid var(--line2);background:var(--surface2);color:var(--text);font-family:var(--sans);font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:9px;cursor:pointer;transition:.1s;display:flex;align-items:center;gap:6px}
.team:hover{background:var(--surface3)}
.team.on{background:var(--accent);border-color:var(--accent);color:#fff}
.team .n{font-family:var(--mono);font-size:10px;opacity:.55}
.team.on .n{opacity:.85}
.team.add{background:transparent;border-style:dashed;color:var(--muted)}
.team.add:hover{color:var(--text);border-color:var(--line2)}
.tmrow{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.tmrow input{flex:1.3;min-width:0} .tmrow select{flex:1;min-width:0}
.tmdel{flex:0 0 auto;background:var(--surface2);border:1px solid var(--line2);color:var(--muted);width:42px;height:44px;border-radius:10px;cursor:pointer;font-size:15px}
.tmdel:hover{color:var(--down);border-color:rgba(255,69,58,0.4)}
.dz{padding:12px;border:1px solid var(--line2);border-radius:12px;display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.dz .danger{background:none;border:none;color:var(--down);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer}
.sess-list{margin-top:6px;max-height:46vh;overflow:auto}
.sess-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}

.sess-row .sp{font-family:var(--mono);font-size:10px;color:var(--muted2)}

  {id:"dj",   name:"Drop Jump",full:"Drop Jump — RSI",          unit:"RSI",      dir:1, cat:"Potenza", sports:["pallavolo","basket","atletica"], lv:{m:[0.8,1.2,1.6,2.0],f:[0.6,1.0,1.4,1.7]}},
  {id:"eur",  name:"EUR",      full:"Elastic Index (CMJ ÷ SJ)", unit:"ratio",    dir:1, cat:"Potenza", sports:["pallavolo","basket"], derived:{from:["cmj","sj"], fn:(c,s)=> s? c/s : null}},
  // ─ VELOCITÀ / AGILITÀ ─
  {id:"spr10",name:"Sprint 10m",full:"Sprint 10 metri",        unit:"s",        dir:-1,cat:"Velocità", sports:["calcio","basket","pallavolo","atletica"], lv:{m:[2.10,1.95,1.85,1.75],f:[2.30,2.15,2.05,1.95]}},
  {id:"spr30",name:"Sprint 30m",full:"Sprint 30 metri",        unit:"s",        dir:-1,cat:"Velocità", sports:["calcio","basket","atletica"], lv:{m:[4.80,4.50,4.25,4.00],f:[5.20,4.90,4.60,4.35]}},
  {id:"rsa",  name:"RSA best", full:"RSA — miglior sprint",     unit:"s",        dir:-1,cat:"Velocità", sports:["calcio","basket","pallavolo"]},
  {id:"sdec", name:"RSA Sdec", full:"RSA — % decremento",       unit:"%",        dir:-1,cat:"Velocità", sports:["calcio","basket"]},

  {id:"vo2",  name:"VO₂max",   full:"VO₂max",                   unit:"ml/kg/min",dir:1, cat:"Aerobico", sports:["calcio","atletica","generale"], lv:{m:[40,48,55,62],f:[35,42,49,56]}},

  {id:"yoyo2",name:"Yo-Yo IR2",full:"Yo-Yo Intermittent Recovery 2",unit:"m",   dir:1, cat:"Aerobico", sports:["calcio"]},

  {id:"fvdef", name:"Deficit F-V", full:"Squilibrio Forza-Velocità",   unit:"%",  dir:-1, cat:"Potenza", sports:["forza","atletica","calcio","basket","pallavolo"]},

  {id:"cod505",name:"505",        full:"505 — cambio direzione 180°",  unit:"s",  dir:-1, cat:"Cambio direzione", sports:["calcio","basket","pallavolo"]},
  {id:"ttest", name:"T-test",     full:"T-test — agilità",             unit:"s",  dir:-1, cat:"Cambio direzione", sports:["calcio","basket","pallavolo"]},
  // ─ ASIMMETRIA & FUNZIONALE ─
  {id:"cmjAsym",  name:"Asimm. CMJ", full:"Asimmetria inter-arto al CMJ", unit:"%", dir:-1, cat:"Asimmetria & funzionale", sports:["pallavolo","basket","calcio","atletica"]},
  {id:"ybtLow",   name:"YBT inf.",   full:"Y-Balance arto inferiore (composite)", unit:"%", dir:1, cat:"Asimmetria & funzionale", sports:["calcio","basket","pallavolo","atletica"]},
  {id:"hopLSI",   name:"Hop LSI",    full:"Single-leg hop — LSI",       unit:"%", dir:1, cat:"Asimmetria & funzionale", sports:["calcio","basket","pallavolo","atletica"]},
  {id:"tripleHop",name:"Triple hop", full:"Triple hop — LSI",           unit:"%", dir:1, cat:"Asimmetria & funzionale", sports:["calcio","basket","atletica"]},
  // ─ MOBILITÀ & STABILITÀ ─
  {id:"shIR",  name:"Spalla IR",  full:"Rotazione interna gleno-omerale (GIRD)", unit:"°", dir:1, cat:"Mobilità & stabilità", sports:["pallavolo"]},

  {id:"fmsLunge",   name:"FMS Lunge",   full:"FMS · In-Line Lunge",           unit:"/3", dir:1, cat:"Functional Movement Screen", sports:["generale","forza"]},
  {id:"fmsShoulder",name:"FMS Spalla",  full:"FMS · Shoulder Mobility",       unit:"/3", dir:1, cat:"Functional Movement Screen", sports:["generale","forza"]},
  {id:"fmsASLR",    name:"FMS ASLR",    full:"FMS · Active Straight-Leg Raise",unit:"/3",dir:1, cat:"Functional Movement Screen", sports:["generale","forza"]},
  {id:"fmsPushup",  name:"FMS Push-up", full:"FMS · Trunk Stability Push-Up", unit:"/3", dir:1, cat:"Functional Movement Screen", sports:["generale","forza"]},
  {id:"fmsRotary",  name:"FMS Rotary",  full:"FMS · Rotary Stability",        unit:"/3", dir:1, cat:"Functional Movement Screen", sports:["generale","forza"]},

     derived:{from:["fmsSquat","fmsHurdle","fmsLunge","fmsShoulder","fmsASLR","fmsPushup","fmsRotary"], fn:function(){ return Array.prototype.reduce.call(arguments,(a,b)=>a+b,0); }}},
];
const TMAP={}; TESTS.forEach(t=>TMAP[t.id]=t);

/* ═══════════════ STATO ═══════════════ */
const KEY="testmonitor_v1";
let S={athletes:[], data:{}, sport:"pallavolo"};
/* data[athleteId][testId] = [{d:"YYYY-MM-DD", v:Number}, ...] (ordinati per data) */

function load(){
  try{ const r=localStorage.getItem(KEY); if(r) S=JSON.parse(r); }catch(e){}
  normalize();
}
const CFG_DEF={rdGreen:80, rdAmber:65, rdCrit:50, acwrLow:0.8, acwrHigh:1.3, acwrCritLow:0.5, acwrCritHigh:1.5, cmjDrop:5, painCut:4};
function normalize(){
  if(!S.sport) S.sport="pallavolo";
  if(!S.view) S.view="today";
  if(!S.athletes) S.athletes=[]; if(!S.data) S.data={};
  if(!S.teams) S.teams=[];
  if(!S.readiness) S.readiness={};
  if(!S.load) S.load={};
  if(!S.cfg) S.cfg={};
  Object.keys(CFG_DEF).forEach(k=>{ if(typeof S.cfg[k]!=="number"||isNaN(S.cfg[k])) S.cfg[k]=CFG_DEF[k]; });
  if(!S.activeTeam) S.activeTeam="all";
  // migrazione: atleti senza squadra → crea una squadra di default
  if(S.athletes.length && S.teams.length===0){
    const tid=uid(); S.teams.push({id:tid, name:"Squadra 1", sport:S.sport});
    S.athletes.forEach(a=>{ if(!a.team) a.team=tid; });
  }
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} if(AUTH&&AUTH.email) triggerCloud(); }

/* ═══════════════ LOGIN + CLOUD ═══════════════ */
const API="/api/store";
const AUTHKEY="ip_auth";
let AUTH=null;            // {email, password}
let _cloudTimer=null;

function setSync(state){
  const d=document.getElementById("syncDot"); if(!d) return;
  d.className="sdot"+(state==="saving"?" saving":state==="off"?" off":"");
  d.title = state==="saving"?"Salvataggio…":state==="off"?"Offline — salvato sul dispositivo":"Sincronizzato";
}
function apiCall(action, extra){
  return fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify(Object.assign({action,email:AUTH.email,password:AUTH.password},extra||{}))})
    .then(r=>r.json().then(j=>{ if(!r.ok){ const e=new Error(j.error||("HTTP "+r.status)); e.status=r.status; throw e; } return j; }));
}
function triggerCloud(){ clearTimeout(_cloudTimer); _cloudTimer=setTimeout(cloudSave,1400); }
function cloudSave(){
  if(!AUTH) return;
  setSync("saving");

/* ═══════════════ HELPER TREND ═══════════════ */
function series(aid,tid){
  const t=TMAP[tid];
  if(t && t.derived) return derivedSeries(aid,t);
  return (S.data[aid]&&S.data[aid][tid])||[];
}
function derivedSeries(aid,t){
  const maps=t.derived.from.map(id=>{ const m={}; ((S.data[aid]&&S.data[aid][id])||[]).forEach(e=>m[e.d]=e.v); return m; });
  const dates=Object.keys(maps[0]).filter(d=>maps.every(m=>m[d]!=null)).sort();
  const out=[];
  dates.forEach(d=>{ const v=t.derived.fn.apply(null, maps.map(m=>m[d])); if(v!=null && isFinite(v)) out.push({d, v:Math.round(v*1000)/1000}); });
  return out;
}
function fmtNum(v){ return Number.isInteger(v)? String(v) : (Math.round(v*100)/100).toString(); }

function deltaInfo(arr,dir){
  if(arr.length<2) return null;
  const last=arr[arr.length-1].v, prev=arr[arr.length-2].v;
  const raw=last-prev;
  const improve=raw*dir;            // >0 meglio, <0 peggio
  const cls = improve>0?"up":improve<0?"down":"flat";
  const arrow = raw>0?"▲":raw<0?"▼":"=";
  return {raw, cls, arrow, txt:(raw>0?"+":"")+fmtNum(raw)};
}

/* livello rispetto ai riferimenti (m/f): 0..4 */
function levelIdx(test,sex,v){
  if(!test.lv) return -1;
  const th=test.lv[sex==="F"?"f":"m"]; if(!th) return -1; let i=0;
  if(test.dir<0){ for(let k=0;k<th.length;k++){ if(v<=th[k]) i=k+1; } }
  else          { for(let k=0;k<th.length;k++){ if(v>=th[k]) i=k+1; } }
  return i; // 0=sotto base ... 4=elite
}
const LVCOL=["#6C757D","#FF9F0A","#FFD60A","#9BE65A","#34C759"];

function sparkline(arr,dir){
  if(arr.length<2) return "";
  const vs=arr.map(x=>x.v), mn=Math.min(...vs), mx=Math.max(...vs), rng=(mx-mn)||1;
  const W=84,H=14, step=W/(vs.length-1);
  const pts=vs.map((v,i)=>{ const y=H-2-((v-mn)/rng)*(H-4); return (i*step).toFixed(1)+","+y.toFixed(1); }).join(" ");
  const di=deltaInfo(arr,dir); const col= di? (di.cls==="up"?"var(--up)":di.cls==="down"?"var(--down)":"var(--flat)") : "var(--flat)";
  const lx=((vs.length-1)*step).toFixed(1), ly=(H-2-((vs[vs.length-1]-mn)/rng)*(H-4)).toFixed(1);
  return '<svg class="spark" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">'+
    '<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>'+
    '<circle cx="'+lx+'" cy="'+ly+'" r="1.8" fill="'+col+'"/></svg>';
}

function chartSVG(lines,t){
  const W=720,H=320,padL=46,padR=16,padT=16,padB=34;
  let ts=[],vs=[];
  lines.forEach(l=>l.pts.forEach(p=>{ ts.push(new Date(p.d).getTime()); vs.push(p.v); }));
  let tmin=Math.min(...ts), tmax=Math.max(...ts), vmin=Math.min(...vs), vmax=Math.max(...vs);
  const vpad=(vmax-vmin)*0.10 || Math.max(1, Math.abs(vmax)*0.05); vmin-=vpad; vmax+=vpad;
  const X=ms=> tmax===tmin ? (padL+(W-padL-padR)/2) : padL+(ms-tmin)/(tmax-tmin)*(W-padL-padR);
  const Y=v => padT+(vmax-v)/(vmax-vmin)*(H-padT-padB);
  const dlabel=ms=>{ const d=new Date(ms); return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+String(d.getFullYear()).slice(2); };

  let s='<svg class="chart" viewBox="0 0 '+W+' '+H+'">';
  for(let i=0;i<=4;i++){ const v=vmin+(vmax-vmin)*i/4, y=Y(v);
    s+='<line x1="'+padL+'" y1="'+y.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+y.toFixed(1)+'" stroke="#2c2c30" stroke-width="1"/>';
    s+='<text x="'+(padL-8)+'" y="'+(y+4).toFixed(1)+'" fill="#6C757D" font-size="12" font-family="ui-monospace,monospace" text-anchor="end">'+fmtNum(Math.round(v*100)/100)+'</text>';
  }
  s+='<text x="'+padL+'" y="'+(H-12)+'" fill="#6C757D" font-size="12" font-family="ui-monospace,monospace" text-anchor="start">'+dlabel(tmin)+'</text>';
  if(tmax!==tmin) s+='<text x="'+(W-padR)+'" y="'+(H-12)+'" fill="#6C757D" font-size="12" font-family="ui-monospace,monospace" text-anchor="end">'+dlabel(tmax)+'</text>';

  lines.forEach(l=>{ if(l.hidden) return;
    const pts=l.pts.slice().sort((a,b)=> new Date(a.d)-new Date(b.d));
    if(pts.length>1){
      const pstr=pts.map(p=>X(new Date(p.d).getTime()).toFixed(1)+','+Y(p.v).toFixed(1)).join(" ");
      s+='<polyline points="'+pstr+'" fill="none" stroke="'+l.color+'" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>';
    }
    pts.forEach(p=>{ s+='<circle cx="'+X(new Date(p.d).getTime()).toFixed(1)+'" cy="'+Y(p.v).toFixed(1)+'" r="3.4" fill="'+l.color+'" stroke="#0A0A0A" stroke-width="1"/>'; });
  });
  s+='</svg>';
  return '<div class="chartbox">'+s+'</div>';
}

function trendTable(lines,t){
  let h='<div class="ttbl"><div class="ttr tth"><span class="tc nm">Atleta</span>'+
    '<span class="tc">Primo</span><span class="tc">Ultimo</span><span class="tc">Δ totale</span></div>';
  lines.forEach(l=>{
    const f=l.pts[0].v, last=l.pts[l.pts.length-1].v, raw=last-f, imp=raw*t.dir;
    const c=imp>0?"up":imp<0?"down":"flat";
    h+='<div class="ttr"'+(l.hidden?' style="opacity:.4"':'')+'><span class="tc nm">'+
       '<span class="adot" style="background:'+l.color+'"></span>'+esc(l.a.name)+'</span>'+
       '<span class="tc mono">'+fmtNum(f)+'</span>'+
       '<span class="tc mono">'+fmtNum(last)+'</span>'+
       '<span class="tc"><span class="delta '+c+'">'+(raw>0?"+":"")+fmtNum(raw)+'</span></span></div>';
  });
  return h+'</div>';
}

function delTeam(id){
  const t=S.teams.find(x=>x.id===id); if(!t) return;

const SCREEN_KEYS=["scHeart","scChest","scDizzy","scBreath","scJoint","scFamily","scMedsHeart"];

function checkField(f,p){
  const on=!!(p&&p[f.k]);
  return '<label class="pcheck"><input type="checkbox" id="p_'+f.k+'"'+(on?' checked':'')+'><span>'+f.l+'</span></label>';
}
function profileField(f, p){
  const v = (p && p[f.k]!=null) ? p[f.k] : "";
  const ev = String(v).replace(/"/g,"&quot;");
  if(f.t==="area") return '<textarea id="p_'+f.k+'" placeholder="—">'+esc(String(v))+'</textarea>';
  if(f.t==="select"){
    let o=f.o.map(opt=>'<option value="'+opt+'"'+(v===opt?" selected":"")+'>'+(opt||"—")+'</option>').join("");
    return '<select id="p_'+f.k+'">'+o+'</select>';
  }
  const type=f.t==="number"?'number':f.t==="date"?'date':'text';
  return '<input id="p_'+f.k+'" type="'+type+'"'+(f.t==="number"?' inputmode="decimal" step="any"':'')+' value="'+ev+'">';
}
function ageFrom(birth){
  if(!birth) return null; const b=new Date(birth); if(isNaN(b)) return null;
  const n=new Date(); let a=n.getFullYear()-b.getFullYear();
  if(n.getMonth()<b.getMonth()||(n.getMonth()===b.getMonth()&&n.getDate()<b.getDate())) a--;
  return a;
}
function openAthlete(id){
  const a=S.athletes.find(x=>x.id===id); if(!a) return;
  const p=a.profile||{};
  let topt=S.teams.map(t=>'<option value="'+t.id+'"'+(a.team===t.id?" selected":"")+'>'+esc(t.name)+'</option>').join("");
  topt+='<option value=""'+(!a.team?" selected":"")+'>Senza squadra</option>';
  const age=ageFrom(p.birth);
  let h='<div class="mh"><div><div class="mt">Scheda atleta</div>'+
    '<div class="ms">'+esc(a.name)+(age!=null?' · '+age+' anni':'')+'</div></div>'+
    '<div style="display:flex;gap:6px;align-items:center">'+
    '<button class="btn sm" onclick="printAthlete(\''+id+'\')" title="Esporta / stampa in PDF">🖨 PDF</button>'+
    '<button class="mcl" onclick="closeM()">✕</button></div></div>'+
    '<label class="fl">Nome e cognome</label>'+
    '<input id="eN" value="'+esc(a.name)+'">'+
    '<div class="row2"><div><label class="fl">Squadra</label>'+
    '<select id="eT">'+topt+'</select></div>'+
    '<div><label class="fl">Sesso</label>'+
    '<select id="eS"><option value="M"'+(a.sex!=="F"?" selected":"")+'>Maschile</option>'+
    '<option value="F"'+(a.sex==="F"?" selected":"")+'>Femminile</option></select></div></div>';
  const _team=S.teams.find(t=>t.id===a.team);
  const _sport=(_team&&_team.sport)||"generale";
  const kb=SPORTKB[_sport]||SPORTKB.generale;
  const _flags=SCREEN_KEYS.filter(k=>p[k]).length;
  if(_flags) h+='<div class="alert danger" style="margin-top:10px"><span class="ai">⚠️</span><span>'+
    '<b>Screening: '+_flags+' voce/i positive.</b> Consigliata una verifica medica prima di proporre carichi intensi.</span></div>';
  // sezioni profilo (wrapper per aggiornare la guida dal vivo)
  h+='<div oninput="updateBrief(\''+id+'\')" onchange="updateBrief(\''+id+'\')">';
  let i=0;
  while(i<PROFILE.length){
    const f=PROFILE[i];
    if(f.sec){ h+='<div class="psec">'+f.sec+'</div>'; i++; continue; }
    // accoppia due campi "half" consecutivi
    const next=PROFILE[i+1];
    if(f.half && next && next.half && !next.sec){
      h+='<div class="row2"><div><label class="fl">'+f.l+'</label>'+profileField(f,p)+'</div>'+
         '<div><label class="fl">'+next.l+'</label>'+profileField(next,p)+'</div></div>';
      i+=2;
    } else if(f.t==="check"){
      h+=checkField(f,p); i++;
    } else {
      h+='<label class="fl">'+f.l+'</label>'+(f.k==="role"?roleInput(p,kb,id):profileField(f,p)); i++;
    }
  }
  h+='</div>';
  // GUIDA inline in fondo
  h+='<div class="psec" style="color:var(--accent);border-color:var(--line2);margin-top:24px">📋 Guida preparazione & percorso — '+kb.label+'</div>'+
     '<div id="briefBox">'+briefBody(kb, p.role||"", p)+'</div>';
  h+='<div style="height:18px"></div>'+
    '<button class="btn primary" style="width:100%" onclick="saveAthleteEdit(\''+id+'\')">Salva scheda</button>'+
    '<div class="dz"><span style="color:var(--muted);font-size:12px">Elimina atleta e dati</span>'+
    '<button class="danger" onclick="delAthlete(\''+id+'\')">Elimina</button></div>';
  modal(h);
}
function saveAthleteEdit(id){
  const a=S.athletes.find(x=>x.id===id); if(!a) return;
  const n=document.getElementById("eN").value.trim(); if(!n){ toast("Inserisci un nome"); return; }
  a.name=n; a.team=document.getElementById("eT").value||null; a.sex=document.getElementById("eS").value;
  const p={};
  PROFILE.forEach(f=>{ if(f.sec) return; const el=document.getElementById("p_"+f.k); if(!el) return;
    if(f.t==="check"){ if(el.checked) p[f.k]=true; }
    else { const v=el.value.trim(); if(v) p[f.k]=v; }
  });
  a.profile=p;
  save(); closeM(); render(); toast("Scheda salvata");
}
function delAthlete(id){
  const a=S.athletes.find(x=>x.id===id); if(!a) return;
  if(!confirm("Eliminare "+a.name+" e tutti i suoi dati?")) return;
  S.athletes=S.athletes.filter(x=>x.id!==id); delete S.data[id];
  save(); closeM(); render(); toast("Atleta eliminato");
}

function kbSection(title, arr){
  if(!arr||!arr.length) return "";
  let h='<div class="gsec">'+title+'</div><ul class="kb">';
  arr.forEach(x=>h+='<li>'+x+'</li>');
  return h+'</ul>';
}
function matchRole(kb, role){
  if(!kb.roles) return null;
  const r=role.toLowerCase().trim();
  for(const k in kb.roles){ if(k.toLowerCase()===r) return kb.roles[k]; }
  for(const k in kb.roles){ if(r.indexOf(k.toLowerCase())>=0 || k.toLowerCase().indexOf(r)>=0) return kb.roles[k]; }
  return null;
}
function pathSuggestion(p, kb){
  const out=[];
  const phase=p.seasonPhase, goal=p.goal, exp=p.experience;
  const map={
    "Off-season":"<b>Off-season</b>: costruisci la base — forza massimale ed eventuale ipertrofia, volume alto con recuperi pieni.",
    "Pre-season":"<b>Pre-season</b>: converti la forza in potenza (pliometria, velocità) e porta su la condizione specifica dello sport.",
    "In-season":"<b>In-season</b>: mantieni forza e potenza con volumi bassi; priorità a freschezza e gestione della fatica (vedi vista Fatica).",
    "Transizione":"<b>Transizione</b>: scarico e recupero attivo, con uno stimolo minimo per non perdere gli adattamenti."
  };
  if(phase && map[phase]) out.push(map[phase]);
  if(exp){ if(exp.indexOf("Principiante")>=0) out.push("Principiante: priorità a tecnica e progressione lineare semplice prima di complicare.");
    else if(exp.indexOf("Avanzato")>=0||exp.indexOf("Esperto")>=0) out.push("Atleta evoluto: serve periodizzazione strutturata e varietà di stimoli per continuare a progredire."); }
  if(goal) out.push("Obiettivo dichiarato: <b>"+esc(goal)+"</b> — allinea selezione esercizi e volumi a questo.");
  if(!out.length) out.push("Compila fase di stagione, obiettivo ed esperienza per un indirizzo personalizzato.");
  return out;
}
function briefBody(kb, role, p){
  p=p||{};
  let h=kbSection("Percorso consigliato", pathSuggestion(p, kb));
  h+=kbSection("Richieste dello sport", kb.demands);
  h+=kbSection("Gesto specifico", kb.gesture);
  h+=kbSection("Direttive di allenamento", kb.training);
  h+=kbSection("Prevenzione infortuni", kb.prevention);
  h+=kbSection("Monitoraggio &amp; carichi", kb.monitoring);
  if(kb.roles && Object.keys(kb.roles).length){
    if(role){ const rk=matchRole(kb, role);
      if(rk) h+=kbSection("Ruolo: "+esc(role), rk);
      else h+='<div class="gnote">Nessuna scheda specifica per «'+esc(role)+'»: valgono le indicazioni generali dello sport.</div>';
    } else h+='<div class="gnote">Scrivi il <b>ruolo</b> nel campo qui sopra per le indicazioni specifiche.</div>';
  }
  return h;
}

  // profilo (solo campi compilati)

  PROFILE.forEach(f=>{

  // quadro test

    withData.forEach(t=>{ const arr=series(a.id,t.id); const last=arr[arr.length-1];
      const li=levelIdx(t,a.sex,last.v); const di=deltaInfo(arr,t.dir);
      h+='<tr><td>'+t.name+' <span style="color:#888">('+t.unit+')</span></td><td>'+fmtNum(last.v)+'</td><td>'+(li>=0?L[li]:"—")+'</td><td>'+(di?(di.arrow+" "+di.txt):"—")+'</td><td>'+fmtDate(last.d)+'</td></tr>';
    });
    h+='</tbody></table>';
  }
  // stato attuale
  const rarr=(S.readiness&&S.readiness[a.id])||[]; const rlast=rarr[rarr.length-1];
  const ac=(typeof acwr==="function")?acwr(a.id):null;
  if(rlast||ac){ h+='<div class="psc">Stato attuale</div>';
    if(rlast) h+='<div class="pf"><b>Readiness:</b> '+readinessScore(rlast)+'/100 · check-in '+fmtDate(rlast.d)+'</div>';
    if(ac) h+='<div class="pf"><b>ACWR (carico acuto:cronico):</b> '+fmtNum(Math.round(ac.acwr*100)/100)+'</div>';
  }
  // guida
  h+='<div class="psc">Guida preparazione &amp; percorso — '+kb.label+'</div><div class="pbrief">'+briefBody(kb, p.role||"", p)+'</div>';
  h+='<div class="pfoot">Iron Performance · documento riservato'+((AUTH&&AUTH.email)?' · '+esc(AUTH.email):'')+'</div></div>';

  let pa=document.getElementById("printArea");
  if(!pa){ pa=document.createElement("div"); pa.id="printArea"; document.body.appendChild(pa); }
  pa.innerHTML=h;
  function done(){ document.body.classList.remove("printing"); window.removeEventListener("afterprint",done); window.removeEventListener("focus",done); }
  window.addEventListener("afterprint",done);
  window.addEventListener("focus",done);
  document.body.classList.add("printing");
  setTimeout(()=>{ window.print(); }, 80);
}

function readinessScore(e){
  // sonno: alto=meglio; dolori/fatica/stress: alto=peggio
  const g = (e.sl||0) + (6-(e.so||0)) + (6-(e.fa||0)) + (6-(e.st||0));
  return Math.round((g-4)/16*100);
}
function readinessColor(pc){ const c=S.cfg; return pc>=c.rdGreen?"up":pc>=c.rdAmber?"amber":"down"; }
function cmjFatigue(aid){
  const arr=series(aid,"cmj"); if(arr.length<2) return null;
  const latest=arr[arr.length-1].v;
  const prev=arr.slice(Math.max(0,arr.length-4), arr.length-1);
  const base=prev.reduce((s,e)=>s+e.v,0)/prev.length;
  if(!base) return null;
  const pct=(latest-base)/base*100;
  return {pct, fatigued: pct<=-(S.cfg.cmjDrop)};
}

    else if(!isNaN(pain) && pain>=S.cfg.painCut){ flags.push({t:"⚠ Dolore "+pain+"/10",c:"down"}); sev+=4; }
    const sc=SCREEN_KEYS.filter(k=>p[k]).length;
    if(sc){ flags.push({t:"🚩 Screening "+sc,c:"down"}); sev+=5; }
    const rarr=(S.readiness&&S.readiness[a.id])||[]; const rl=rarr[rarr.length-1]; let rToday=false;
    if(rl){ const pc=readinessScore(rl); rToday=(rl.d===today);
      if(pc<S.cfg.rdCrit){ flags.push({t:"🔋 Readiness "+pc,c:"down"}); sev+=4; }
      else if(pc<S.cfg.rdAmber){ flags.push({t:"🔋 Readiness "+pc,c:"amber"}); sev+=2; } }
    const ac=acwr(a.id);
    if(ac){ const r=ac.acwr;
      if(r>S.cfg.acwrCritHigh||r<S.cfg.acwrCritLow){ flags.push({t:"📈 ACWR "+fmtNum(Math.round(r*100)/100),c:"down"}); sev+=3; }
      else if(r>S.cfg.acwrHigh||r<S.cfg.acwrLow){ flags.push({t:"📈 ACWR "+fmtNum(Math.round(r*100)/100),c:"amber"}); sev+=1; } }
    const cf=cmjFatigue(a.id);
    if(cf&&cf.fatigued){ flags.push({t:"⬇️ CMJ "+fmtNum(Math.round(cf.pct*10)/10)+"%",c:"down"}); sev+=2; }
    let sug=""; const rpc=rl?readinessScore(rl):null;
    if(p.injuriesCurrent && (""+p.injuriesCurrent).trim()) sug="Lavoro sotto soglia di dolore; valuta fisio/medico prima di caricare.";
    else if(!isNaN(pain) && pain>=S.cfg.painCut) sug="Dolore presente: resta sotto soglia, non peggiorare nelle 24h.";

    else if(ac && (ac.acwr>S.cfg.acwrCritHigh||ac.acwr<S.cfg.acwrCritLow)) sug=(ac.acwr>S.cfg.acwrCritHigh?"Carico acuto alto: attenua — o conferma che è un picco pianificato.":"Carico molto basso: reintroduci gradualmente (rischio detraining).");
    else if(rpc!=null && rpc<S.cfg.rdAmber) sug="Modula il volume, evita massimali; cura il recupero.";

    else if(cf&&cf.fatigued) sug="Riduci pliometria/alta intensità; monitora il CMJ.";
    return {a, flags, sev, rl, rToday, sug};
  });
  const manage=items.filter(x=>x.flags.length).sort((x,y)=>y.sev-x.sev);

     tstat(ath.length,"Atleti")+
     tstat(checkinToday+"/"+ath.length,"Check-in oggi")+

     tstat(ready.length,"Pronti","up")+'</div>';

  if(manage.length){
    manage.forEach(x=>{
      h+='<div class="tcard" onclick="openAthlete(\''+x.a.id+'\')">'+
         '<div class="tname">'+esc(x.a.name)+'<span class="sx">'+(x.a.sex||"M")+'</span></div>'+

         (x.sug?'<div class="tsugg">💡 '+x.sug+'</div>':'')+'</div>';

/* ── Carico interno (sRPE) + ACWR ── */
function dayLoad(e){ return (e.rpe||0)*(e.min||0); }
function acwr(aid){
  const arr=(S.load&&S.load[aid])||[]; if(!arr.length) return null;
  const now=new Date(todayISO()); let acute=0, chronic=0;
  arr.forEach(e=>{ const days=(now-new Date(e.d))/86400000; const L=dayLoad(e);
    if(days>=0&&days<7) acute+=L;
    if(days>=0&&days<28) chronic+=L; });
  chronic=chronic/4;                       // media settimanale sulle 4 settimane
  if(chronic<=0) return null;
  return {acwr:acute/chronic, acute:Math.round(acute), chronic:Math.round(chronic)};
}
function acwrColor(r){ if(r==null) return "flat"; const c=S.cfg; if(r>=c.acwrLow&&r<=c.acwrHigh) return "up"; if(r>c.acwrCritHigh||r<c.acwrCritLow) return "down"; return "amber"; }
function weekStats(aid){
  const arr=(S.load&&S.load[aid])||[]; const now=new Date(todayISO()); const daily={};
  for(let i=0;i<7;i++){ const d=new Date(now); d.setDate(d.getDate()-i); daily[d.toISOString().slice(0,10)]=0; }
  arr.forEach(e=>{ if(daily.hasOwnProperty(e.d)) daily[e.d]+=dayLoad(e); });
  const vals=Object.keys(daily).map(k=>daily[k]); const sum=vals.reduce((a,b)=>a+b,0); const mean=sum/7;
  const sd=Math.sqrt(vals.reduce((a,b)=>a+(b-mean)*(b-mean),0)/7);
  const monotony=sd>0?mean/sd:0;
  return {weekly:Math.round(sum), monotony:monotony, strain:Math.round(sum*monotony)};
}

  const rpeSel=(def)=>{ let o=""; for(let i=0;i<=10;i++) o+='<option value="'+i+'"'+(i===def?" selected":"")+'>'+i+'</option>'; return '<select data-k="rpe">'+o+'</select>'; };

function saveLoad(){
  const d=document.getElementById("ldD").value||todayISO();

  document.querySelectorAll(".ci-row").forEach(row=>{

  });
  save(); closeM(); render(); toast("Carico salvato ("+n+")");
}
function delLoad(aid,i){ const arr=S.load[aid]; arr.splice(i,1); if(!arr.length) delete S.load[aid]; save(); openReadinessHistory(aid); render(); }

/* ═══════════════ CELLA: STORICO + INSERIMENTO ═══════════════ */
let CUR={a:null,t:null};
function openCell(aid,tid){
  CUR={a:aid,t:tid};
  drawCell();
  document.getElementById("ov").classList.add("on");
}
function drawCell(){
  const a=S.athletes.find(x=>x.id===CUR.a), t=TMAP[CUR.t], arr=series(CUR.a,CUR.t);
  let h='<div class="mh"><div><div class="mt">'+esc(a.name)+'</div>'+
    '<div class="ms">'+t.full+' · '+t.unit+' · '+(t.dir<0?"più basso = meglio":"più alto = meglio")+'</div></div>'+
    '<button class="mcl" onclick="closeM()">✕</button></div>';
  h+='<button class="gbtn" onclick="openGuide(\''+CUR.t+'\')">📖 Come si esegue questo test</button>';

  // riferimenti
  if(t.lv){
    const th=t.lv[a.sex==="F"?"f":"m"], last=arr.length?arr[arr.length-1].v:null;
    const hit=last!=null?levelIdx(t,a.sex,last):-1;
    const labels=["Base","Discreto","Buono","Ottimo","Elite"];
    h+='<label class="fl">Livello di riferimento ('+(a.sex==="F"?"F":"M")+')</label><div class="lvbar">';
    labels.forEach((lb,i)=>{ h+='<div class="lvseg'+(hit===i?" hit":"")+'">'+lb+(i>0?'<br>≥'+th[i-1]:"")+'</div>'; });
    h+='</div>';
  }

  // inserimento (o avviso calcolo automatico per i test derivati)
  if(t.derived){
    const fromNames=t.derived.from.map(id=>TMAP[id].name).join(" e ");
    h+='<div class="alert info"><span class="ai">⚙️</span><span>Valore <b>calcolato in automatico</b> da '+fromNames+
       '. Non si inserisce a mano: aggiorna '+fromNames+' e l\'EUR si ricalcola da solo.</span></div>';
  } else {
    h+='<label class="fl">Nuova misurazione</label><div class="row2">'+
      '<input id="mV" class="mono" type="number" inputmode="decimal" step="any" placeholder="valore '+t.unit+'">'+
      '<input id="mD" type="date" value="'+todayISO()+'"></div>'+
      '<div style="height:10px"></div>'+
      '<button class="btn primary" style="width:100%" onclick="addMeasure()">Salva misurazione</button>';
  }

  // storico
  if(arr.length){
    const best = t.dir<0 ? Math.min.apply(null,arr.map(e=>e.v)) : Math.max.apply(null,arr.map(e=>e.v));
    h+='<label class="fl">Storico ('+arr.length+')</label><div class="hist">';
    for(let i=arr.length-1;i>=0;i--){
      const e=arr[i]; let dl="";
      if(i>0){ const raw=e.v-arr[i-1].v, imp=raw*t.dir;
        const c=imp>0?"up":imp<0?"down":"flat";
        dl='<span class="delta '+c+'" style="margin:0 8px 0 0">'+(raw>0?"▲":raw<0?"▼":"=")+' '+(raw>0?"+":"")+fmtNum(raw)+'</span>'; }
      const pr=(arr.length>1 && e.v===best)?'<span class="star" title="Record personale">★</span> ':'';
      h+='<div class="hrow"><span class="hd">'+fmtDate(e.d)+'</span>'+
         '<span class="hv">'+pr+fmtNum(e.v)+' <span style="color:var(--muted2);font-size:10px">'+t.unit+'</span></span>'+
         dl+(t.derived?'':'<span class="hdl" onclick="delMeasure('+i+')">🗑</span>')+'</div>';
    }
    h+='</div>';
  } else {
    h+='<p class="hint">'+(t.derived
      ? 'Nessun valore ancora: serve almeno una data in cui siano presenti entrambi i test sorgente.'
      : 'Nessuna misurazione ancora. La prima crea il punto di partenza; dalla seconda in poi vedrai la variazione colorata.')+'</p>';
  }
  document.getElementById("modal").innerHTML=h;
  setTimeout(()=>{ const v=document.getElementById("mV"); if(v) v.focus(); },60);
}
function addMeasure(){
  const t=TMAP[CUR.t];
  const v=parseFloat(document.getElementById("mV").value);
  const d=document.getElementById("mD").value||todayISO();
  if(isNaN(v)){ toast("Inserisci un valore numerico"); return; }
  if(v<0){ toast("Il valore non può essere negativo"); return; }
  if(!S.data[CUR.a]) S.data[CUR.a]={};
  if(!S.data[CUR.a][CUR.t]) S.data[CUR.a][CUR.t]=[];
  const arr=S.data[CUR.a][CUR.t];
  const ex=arr.find(e=>e.d===d);
  if(ex){ ex.v=v; } else { arr.push({d,v}); }
  arr.sort((x,y)=>x.d<y.d?-1:1);
  save(); drawCell(); render(); toast("Misurazione salvata");
}
function delMeasure(i){
  const arr=series(CUR.a,CUR.t); arr.splice(i,1);
  if(arr.length===0) delete S.data[CUR.a][CUR.t];
  save(); drawCell(); render();
}

    interpret:["Stessa logica del single hop: <b>≥90%</b> indicativo, da leggere con i valori assoluti."],
    advice:["Allena potenza monopodalica e capacità di assorbimento (atterraggi) sull'arto debole."],
    note:"Parte della batteria hop test per il return-to-sport."},

  shIR:{eyebrow:"Spalla overhead — mobilità",

    steps:[{t:"Posizione",d:"Supino, spalla a 90° di abduzione, gomito a 90°; stabilizza la scapola."},

      {t:"Confronta i lati",d:"Calcola IR dominante vs non dominante e la rotazione totale (IR+ER)."}],
    interpret:["<b>GIRD</b> = perdita di IR sul lato dominante; preoccupa soprattutto se la <b>rotazione totale</b> è ridotta &gt;~5° rispetto all'altro lato.","Un certo shift (più ER, meno IR) è adattivo nell'overhead: conta lo squilibrio eccessivo, non la semplice differenza."],
    advice:["GIRD con perdita di rotazione totale → mobilità capsulare posteriore (sleeper / cross-body stretch) e controllo scapolare.","Abbina rinforzo di extrarotatori e gran dentato per la stabilità."],
    note:"Test chiave per la pallavolo e gli altri sport overhead (tennis, baseball)."},

  shMob:{eyebrow:"Spalla — mobilità globale",
    what:"Screening rapido di mobilità combinata della spalla (back-scratch): si misura la <b>distanza tra le mani</b> dietro la schiena. Veloce, non sostituisce la misura goniometrica.",
    steps:[{t:"Una mano sopra la spalla",d:"L'altra risale dal basso dietro la schiena."},
      {t:"Misura la distanza",d:"Spazio (o sovrapposizione) tra le dita, in cm. Ripeti invertendo le mani."},
      {t:"Confronta i lati",d:"Annota dx e sx separatamente."}],
    interpret:["Meno distanza (o sovrapposizione delle dita) = miglior mobilità. Confronta i due lati per le asimmetrie."],
    advice:["Limitazioni → mobilità di rotazione e del cingolo scapolare; evita stretch aggressivi su spalle instabili."],
    note:"Screening grossolano: per decisioni cliniche usa la misura ROM (shIR/ER)."},

  shStab:{eyebrow:"Spalla — stabilità dinamica",

    steps:[{t:"Posizione di push-up",d:"Mano di appoggio sotto la spalla; corpo allineato."},
      {t:"3 direzioni",d:"Reach mediale, supero-laterale, infero-laterale con la mano libera."},
      {t:"Composite",d:"(somma reach) / (3 × lunghezza arto) × 100; confronta i lati."}],
    interpret:["Composite più alto = miglior stabilità. Le <b>asimmetrie dx/sx</b> sono il dato più utile nell'overhead."],
    advice:["Bassa stabilità → controllo scapolare, gran dentato, cuffia dei rotatori, anti-estensione del core."],

  ankleDF:{eyebrow:"Caviglia — dorsiflessione",

      {t:"Confronta i lati",d:"Misura dx e sx."}],
    interpret:["Riferimento pratico: <b>~10 cm</b> = buona mobilità. Valori bassi o asimmetrie limitano squat e atterraggi."],
    advice:["Limitazioni → mobilità di caviglia (soleo/gastrocnemio + articolare), poi rinforzo nel nuovo ROM."],
    note:"Una dorsiflessione scarsa sposta il carico su ginocchio e schiena."},

  fmsSquat:{eyebrow:"FMS · pattern fondamentale",

  fmsHurdle:{eyebrow:"FMS · pattern monopodalico",

    interpret:["Asimmetrie dx/sx sono il dato più utile: un lato nettamente peggiore merita attenzione.","Compensi di tronco/anca indicano scarso controllo monopodalico."],

  fmsLunge:{eyebrow:"FMS · pattern in linea",

    interpret:["Perdita di equilibrio o dei contatti del bastone = deficit di stabilità/mobilità.","Confronta i lati: l'asimmetria conta più del voto assoluto."],

      {t:"Entrambi i lati",d:"Registra il lato peggiore. 3/2/1."},
      {t:"Clearing test",d:"Mano sulla spalla opposta e spingi il gomito in alto: se compare dolore → punteggio 0."}],
    interpret:["Dolore al clearing test azzera il punteggio e impone cautela/valutazione.","Negli sport overhead leggilo insieme alla rotazione gleno-omerale (GIRD)."],

  fmsASLR:{eyebrow:"FMS · catena posteriore & core",

      {t:"Entrambi i lati",d:"Registra il lato peggiore. 3/2/1, 0 se dolore."}],
    interpret:["Limite = ischiocrurali/anca poco estensibili o scarso controllo del bacino.","Asimmetrie marcate sono il segnale più utile."],
    advice:["Mobilità attiva di anca e ischiocrurali, controllo anti-estensione del core."],
    note:"Punteggio 0-3; si registra il lato peggiore."},

  fmsPushup:{eyebrow:"FMS · stabilità del tronco",

Object.keys(PROTO_EXTRA).forEach(k=>{ if(PROTO[k]) Object.assign(PROTO[k], PROTO_EXTRA[k]); });

function lvTable(t){
  const labels=["Base","Discreto","Buono","Ottimo","Elite"]; const op=t.dir<0?"≤":"≥";
  function bar(sex){ const th=t.lv[sex]; let r='<div class="lvbar">';
    labels.forEach((lb,i)=>{ r+='<div class="lvseg">'+lb+(i>0?'<br>'+op+th[i-1]:"")+'</div>'; }); return r+'</div>'; }
  return '<div style="font-size:10px;color:var(--muted2);font-family:var(--mono);margin:2px 0 4px">Maschile ('+t.unit+') · indicativi</div>'+bar("m")+
         '<div style="font-size:10px;color:var(--muted2);font-family:var(--mono);margin:9px 0 4px">Femminile ('+t.unit+') · indicativi</div>'+bar("f");
}

function sportMeta(id){ return SPORTS.find(s=>s.id===id)||{icon:"",label:id}; }
function isCore(tid){ if(S.sport==="all") return false; const b=BATTERY[S.sport]; return !!(b&&b.core&&b.core.indexOf(tid)>=0); }
function openBattery(sp){
  let sport=sp;
  if(!sport){ if(S.sport!=="all") sport=S.sport; else { const tm=S.teams.find(t=>t.id===S.activeTeam); sport=(tm&&tm.sport)||"pallavolo"; } }
  document.getElementById("menu").classList.remove("on");
  const b=BATTERY[sport]||BATTERY.generale; const sm=sportMeta(sport);
  let h='<div class="mh"><div><div class="eyebrow">Batteria consigliata</div>'+
    '<div class="mt">'+sm.icon+' '+sm.label+'</div>'+
    '<div class="ms">Quali test usare e quando</div></div><button class="mcl" onclick="closeM()">✕</button></div>';
  h+='<div class="bsports">'+SPORTS.filter(s=>s.id!=="all").map(s=>'<button class="'+(s.id===sport?"on":"")+'" onclick="openBattery(\''+s.id+'\')">'+s.label+'</button>').join("")+'</div>';
  if(b.note) h+='<div class="gnote" style="margin:0 0 12px">'+b.note+'</div>';
  b.groups.forEach(function(g,gi){
    h+='<div class="bgrp"><div class="bt">'+g.t+'</div><div class="bw">⏱ '+g.w+'</div><div class="by">'+g.y+'</div><div class="btests">';
    g.tests.forEach(id=>{ const t=TMAP[id]; if(!t) return;
      h+='<span class="btchip" onclick="openGuide(\''+id+'\')">'+(ICON[id]||"🔬")+' '+t.name+'</span>'; });
    h+='</div>';
    const enterable=g.tests.map(id=>TMAP[id]).filter(t=>t&&!t.derived).length;
    if(enterable) h+='<button class="btn sm" style="margin-top:11px" onclick="openBatterySession(\''+sport+'\','+gi+')">+ Crea sessione con questi test</button>';
    h+='</div>';
  });
  modal(h);
}

function chooseTests(){
  const tid=S.activeTeam;
  if(!tid || tid==="all" || tid==="none"){ toast("Seleziona prima una squadra dalla barra"); return; }
  const team=S.teams.find(t=>t.id===tid); if(!team){ toast("Seleziona una squadra"); return; }
  document.getElementById("menu").classList.remove("on");
  const sel={}; const base=(team.tests&&team.tests.length)?team.tests:TESTS.filter(t=>t.sports.includes(team.sport||"generale")).map(t=>t.id);
  base.forEach(id=>sel[id]=true);
  const cats=["Forza","Potenza","Velocità","Cambio direzione","Aerobico","Asimmetria & funzionale","Mobilità & stabilità","Functional Movement Screen"];
  let h='<div class="mh"><div><div class="mt">Test monitorati</div>'+
    '<div class="ms">'+esc(team.name)+' · '+sportMeta(team.sport||"generale").label+'</div></div>'+
    '<button class="mcl" onclick="closeM()">✕</button></div>';
  h+='<div class="gnote" style="margin-top:0">Scegli quali test vedere nella matrice e nell\'andamento per questa squadra. Quelli non spuntati restano nascosti (non vengono cancellati i dati).</div>';
  h+='<div class="chq"><button class="btn sm" onclick="chooserSet(\'battery\')">🎯 Batteria consigliata</button>'+
     '<button class="btn sm" onclick="chooserSet(\'all\')">Tutti</button>'+
     '<button class="btn sm" onclick="chooserSet(\'none\')">Nessuno</button></div>';
  cats.forEach(c=>{ const ts=TESTS.filter(t=>t.cat===c); if(!ts.length) return;
    h+='<div class="psec">'+c+'</div>';
    ts.forEach(t=>{
      h+='<label class="tchk"><input type="checkbox" data-t="'+t.id+'"'+(sel[t.id]?" checked":"")+(t.derived?' data-d="1"':'')+'>'+
         '<span>'+(ICON[t.id]||"🔬")+' '+t.name+' <i>'+t.unit+'</i>'+(t.derived?' <em>auto</em>':'')+'</span></label>';
    });
  });
  h+='<div style="height:14px"></div><button class="btn primary" style="width:100%" onclick="saveChosenTests()">Salva selezione</button>';
  modal(h);
}
function chooserSet(mode){
  const team=S.teams.find(t=>t.id===S.activeTeam); const sport=team?(team.sport||"generale"):"generale";
  const boxes=document.querySelectorAll('#modal input[data-t]');
  if(mode==="all"){ boxes.forEach(b=>b.checked=true); }
  else if(mode==="none"){ boxes.forEach(b=>b.checked=false); }
  else if(mode==="battery"){ const b=BATTERY[sport]; const set={}; if(b) b.groups.forEach(g=>g.tests.forEach(id=>set[id]=true));
    boxes.forEach(x=>{ x.checked=!!set[x.getAttribute("data-t")]; }); }
}
function saveChosenTests(){
  const team=S.teams.find(t=>t.id===S.activeTeam); if(!team) return;
  const ids=Array.prototype.map.call(document.querySelectorAll('#modal input[data-t]:checked'), i=>i.getAttribute("data-t"));
  if(ids.length) team.tests=ids; else delete team.tests;
  save(); closeM(); render(); toast(ids.length?("Monitori "+ids.length+" test"):"Filtro azzerato (mostro per sport)");
}

function openBatterySession(sport, gi){
  const ath=teamAthletes(); if(ath.length===0){ addAthlete(); return; }
  const b=BATTERY[sport]; if(!b) return; const g=b.groups[gi]; if(!g) return;
  const tests=g.tests.map(id=>TMAP[id]).filter(t=>t && !t.derived);
  let body="";
  tests.forEach(t=>{
    body+='<div class="bsess-test"><div class="bsess-th">'+(ICON[t.id]||"")+' '+t.full+' <span>('+t.unit+')</span></div>';
    ath.forEach(a=>{
      const arr=series(a.id,t.id); const last=arr.length?fmtNum(arr[arr.length-1].v):"";
      body+='<div class="sess-row"><div><div class="sn">'+esc(a.name)+'</div>'+
        (last!==""?'<div class="sp">ultimo: '+last+' '+t.unit+'</div>':'<div class="sp">—</div>')+'</div>'+
        '<input class="mono" type="number" inputmode="decimal" step="any" placeholder="'+(last||t.unit)+'" data-a="'+a.id+'" data-t="'+t.id+'"></div>';
    });
    body+='</div>';
  });
  modal('<div class="mh"><div><div class="mt">Sessione · '+g.t+'</div>'+
    '<div class="ms">'+sportMeta(sport).label+' · '+tests.length+' test · '+ath.length+' atleti</div></div>'+
    '<button class="mcl" onclick="closeM()">✕</button></div>'+
    '<label class="fl">Data</label><input id="bsD" type="date" value="'+todayISO()+'">'+
    '<div style="height:8px"></div>'+body+
    '<div style="height:10px"></div>'+
    '<button class="btn primary" style="width:100%" onclick="saveBatterySession()">Salva sessione</button>');
}
function saveBatterySession(){
  const d=document.getElementById("bsD").value||todayISO(); let n=0;
  document.querySelectorAll("#modal input[data-t]").forEach(inp=>{
    const v=parseFloat(inp.value); if(isNaN(v)) return;
    const aid=inp.getAttribute("data-a"), tid=inp.getAttribute("data-t");
    if(!S.data[aid]) S.data[aid]={}; if(!S.data[aid][tid]) S.data[aid][tid]=[];
    const arr=S.data[aid][tid]; const ex=arr.find(e=>e.d===d);
    if(ex) ex.v=v; else arr.push({d,v});
    arr.sort((x,y)=>x.d<y.d?-1:1); n++;
  });
  save(); closeM(); render(); toast(n+" valori salvati");
}

function guideIndex(){
  const cats=["Forza","Potenza","Velocità","Cambio direzione","Aerobico","Asimmetria & funzionale","Mobilità & stabilità","Functional Movement Screen"];
  let h='<div class="mh"><div><div class="mt">Guida ai test</div>'+
    '<div class="ms">Come si eseguono · cosa misurano · a cosa servono</div></div>'+
    '<button class="mcl" onclick="closeM()">✕</button></div><div class="glist">';
  h+='<div class="grow" onclick="openBattery()" style="border:1px solid var(--accent);background:rgba(230,57,70,.06)"><span class="gic">🎯</span>'+
     '<div><div class="gnm">Batteria consigliata per sport</div><div class="gsub">Quali test usare e quando, già pronti</div></div>'+
     '<span class="gar">›</span></div>';
  cats.forEach(c=>{
    h+='<div class="gcat">'+c+'</div>';
    TESTS.filter(t=>t.cat===c).forEach(t=>{
      h+='<div class="grow" onclick="openGuide(\''+t.id+'\')"><span class="gic">'+(ICON[t.id]||"🔬")+'</span>'+
         '<div><div class="gnm">'+t.name+'</div><div class="gsub">'+t.full+' · '+t.unit+'</div></div>'+
         '<span class="gar">›</span></div>';
    });
  });
  modal(h+'</div>');
}

function openGuide(tid){
  const t=TMAP[tid], p=PROTO[tid]||{};
  let h='<button class="gback" onclick="guideIndex()">‹ Tutti i test</button>';
  h+='<div class="mh"><div><div class="eyebrow">'+(p.eyebrow||t.cat)+'</div>'+
     '<div class="mt">'+(ICON[tid]||"")+' '+t.name+'</div>'+
     '<div class="ms">'+t.full+' · '+t.unit+' · '+(t.dir<0?"più basso = meglio":"più alto = meglio")+'</div></div>'+
     '<button class="mcl" onclick="closeM()">✕</button></div>';
  if(p.what)  h+='<div class="gsec">Cosa misura e a cosa serve</div><div class="gwhat">'+p.what+'</div>';
  if(p.alert) h+='<div class="alert '+p.alert.type+'"><span class="ai">'+(p.alert.type==="info"?"ℹ️":"⚠️")+'</span><span>'+p.alert.text+'</span></div>';
  if(p.steps){ h+='<div class="gsec">Come si esegue</div><div class="steps">';
    p.steps.forEach((s,i)=>{ h+='<div class="step"><div class="snum">'+(i+1)+'</div><div class="sbody"><div class="stt">'+s.t+'</div><div class="sds">'+s.d+'</div></div></div>'; });
    h+='</div>'; }
  if(p.interpret){ h+='<div class="gsec">Come interpretare</div><ul class="kb">'+p.interpret.map(x=>'<li>'+x+'</li>').join('')+'</ul>'; }
  if(p.advice){ h+='<div class="gsec">Consigli pratici per l\'allenamento</div><ul class="kb">'+p.advice.map(x=>'<li>'+x+'</li>').join('')+'</ul>'; }
  if(t.lv) h+='<div class="gsec">Valori di riferimento</div>'+lvTable(t);
  if(p.note) h+='<div class="gnote">'+p.note+'</div>';
  modal(h);
}

/* ═══════════════ TOAST ═══════════════ */
let _tt;
function toast(m){ const e=document.getElementById("toast"); e.textContent=m; e.classList.add("on");
  clearTimeout(_tt); _tt=setTimeout(()=>e.classList.remove("on"),1900); }

/* ═══════════════ INIT ═══════════════ */
load();
render();
autoLogin();
</script>
